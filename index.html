<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sambor Staff · Restaurant Log</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1a3a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sambor Staff">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --jungle:  #1a3a2a;
    --deep:    #0f2218;
    --gold:    #c9a84c;
    --gold-lt: #e8c97a;
    --cream:   #f5f0e8;
    --muted:   #6b7a6e;
    --walkin:  #2d6a4f;
    --staying: #1e4d6b;
    --radius:  14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--jungle);
    min-height: 100dvh;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .hotel-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); letter-spacing: .12em; line-height: 1.5; }
  .hotel-sub  { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }

  .sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
  .sync-dot--online  { background: #4caf50; }
  .sync-dot--offline { background: #ff9800; }
  .sync-dot--syncing { background: var(--gold); animation: pulse .8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }

  .lang-toggle {
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: background .2s;
  }
  .lang-toggle:active { background: rgba(201,168,76,.15); }

  main { width: 100%; max-width: 480px; padding: 16px 20px 40px; }
  .view { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(201,168,76,.18);
    border-radius: var(--radius);
    padding: 20px;
  }
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: .15em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
  }

  /* ── Tree ── */
  .tree-card svg { width: 100%; height: auto; display: block; }
  .tree-stats {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding-top: 12px; border-top: 1px solid rgba(201,168,76,.12); margin-top: 10px;
  }
  .tree-progress-row { display: flex; align-items: baseline; gap: 3px; }
  .tree-current   { font-size: 40px; font-weight: 700; color: var(--gold-lt); line-height: 1; font-variant-numeric: tabular-nums; }
  .tree-max       { font-size: 18px; color: var(--muted); font-weight: 500; }
  .tree-num-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
  .tree-breakdown { display: flex; gap: 14px; font-size: 13px; color: rgba(245,240,232,.7); margin-top: 2px; }
  .tree-stage     { font-size: 12px; color: var(--gold); margin-top: 4px; font-weight: 500; }

  /* ── Guest type ── */
  .type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .type-btn {
    border: none; border-radius: 12px; padding: 18px 12px; font-size: 22px;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all .15s;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .type-btn .type-label { font-size: 13px; font-weight: 600; line-height: 1.3; text-align: center; }
  .type-btn .type-sub   { font-size: 10px; opacity: .7; text-align: center; line-height: 1.4; }
  .type-btn.walkin  { background: var(--walkin);  color: #a8e6c4; }
  .type-btn.staying { background: var(--staying); color: #a8d0e8; }
  .type-btn.selected { outline: 2.5px solid var(--gold); outline-offset: 2px; }
  .type-btn:active { transform: scale(.96); }

  /* ── Room ── */
  .room-section { display: none; }
  .room-section.visible { display: block; }
  .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-top: 4px; }
  .room-btn {
    background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 8px; padding: 10px 4px; color: var(--cream); font-size: 13px;
    font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all .15s; text-align: center;
  }
  .room-btn.selected { background: rgba(30,77,107,.6); border-color: #6ab0d4; color: #a8d0e8; }
  .room-btn:active { transform: scale(.95); }

  /* ── Count ── */
  .count-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .count-ctrl { display: flex; align-items: center; gap: 14px; }
  .count-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid rgba(201,168,76,.4);
    background: transparent; color: var(--gold-lt); font-size: 22px; cursor: pointer;
    transition: background .15s; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .count-btn:active { background: rgba(201,168,76,.15); }
  .count-num { font-size: 32px; font-weight: 600; color: var(--gold-lt); min-width: 40px; text-align: center; font-variant-numeric: tabular-nums; }

  /* ── Submit ── */
  .submit-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, var(--gold) 0%, #a87c2a 100%);
    border: none; border-radius: var(--radius); color: var(--deep);
    font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: opacity .15s, transform .1s; letter-spacing: .03em;
  }
  .submit-btn:disabled { opacity: .35; cursor: not-allowed; }
  .submit-btn:not(:disabled):active { transform: scale(.98); }

  /* ── Admin link ── */
  .admin-link-row { display: flex; justify-content: center; padding-top: 4px; }
  .admin-link {
    background: transparent; border: none; color: rgba(245,240,232,.18);
    font-size: 11px; font-family: 'Inter', sans-serif; cursor: pointer;
    padding: 6px 12px; letter-spacing: .05em;
  }

  /* ── Admin view ── */
  .back-btn {
    background: transparent; border: none; color: var(--gold);
    font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer;
    padding: 4px 0; display: flex; align-items: center; gap: 6px; align-self: flex-start;
  }
  .back-btn:active { opacity: .7; }

  /* ── Stats ── */
  .stats-tabs { display: flex; gap: 5px; margin-bottom: 14px; }
  .stats-tab {
    flex: 1; padding: 7px 4px; border: 1px solid rgba(201,168,76,.2); border-radius: 8px;
    background: transparent; color: var(--muted); font-size: 11px; font-weight: 500;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all .15s; text-align: center;
  }
  .stats-tab.active { background: rgba(201,168,76,.15); border-color: var(--gold); color: var(--gold-lt); }
  .stats-tab:active { opacity: .7; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box {
    background: rgba(255,255,255,.04); border-radius: 10px; padding: 12px 6px 10px;
    text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .stat-icon { font-size: 18px; margin-bottom: 2px; }
  .stat-num  { font-size: 22px; font-weight: 700; color: var(--gold-lt); font-variant-numeric: tabular-nums; line-height: 1.1; }
  .stat-sub  { font-size: 10px; color: var(--muted); min-height: 14px; }
  .stat-lbl  { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

  /* ── Log ── */
  .log-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
  .log-list--admin { max-height: 340px; }
  .log-item {
    font-size: 12px; color: rgba(245,240,232,.6); padding: 6px 10px;
    background: rgba(255,255,255,.03); border-radius: 8px;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .log-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .log-badge.walkin  { background: rgba(45,106,79,.5);   color: #a8e6c4; }
  .log-badge.staying { background: rgba(30,77,107,.5);   color: #a8d0e8; }
  .log-badge.event   { background: rgba(201,168,76,.2);  color: var(--gold-lt); }
  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; }
  .log-del {
    background: transparent; border: none; color: rgba(255,100,100,.35);
    font-size: 16px; line-height: 1; cursor: pointer; padding: 2px 4px;
    flex-shrink: 0; transition: color .15s; font-family: 'Inter', sans-serif;
  }
  .log-del:active { color: rgba(255,100,100,.9); }

  /* ── Danger button ── */
  .danger-btn {
    width: 100%; padding: 14px; background: transparent;
    border: 1px solid rgba(255,100,100,.3); border-radius: var(--radius);
    color: rgba(255,160,160,.7); font-size: 14px; font-weight: 500;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: background .15s;
  }
  .danger-btn:active { background: rgba(255,100,100,.1); }

  /* ── Toast ── */
  .toast { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; pointer-events: none; }
  .toast-inner {
    margin-top: 24px; background: var(--deep); border: 1.5px solid var(--gold);
    border-radius: 16px; padding: 14px 24px; font-size: 15px; font-weight: 600;
    color: var(--gold-lt); transform: translateY(-80px); opacity: 0;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .25s;
    text-align: center; max-width: 320px; width: calc(100% - 40px);
  }
  .toast.show .toast-inner { transform: translateY(0); opacity: 1; }

  /* ── Confetti ── */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 200; }
  .confetti-piece { position: absolute; width: 8px; height: 8px; top: -10px; border-radius: 2px; animation: confetti-fall linear forwards; }
  @keyframes confetti-fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,.3); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="hotel-name">Sambor Village Hotel</div>
      <div class="hotel-sub">Restaurant · Staff App</div>
    </div>
    <span id="syncDot" class="sync-dot sync-dot--offline"></span>
  </div>
  <button class="lang-toggle" onclick="toggleLang()" id="langBtn">ភាសាខ្មែរ</button>
</header>

<main>

  <!-- ═══ MAIN VIEW ═══ -->
  <div id="viewMain" class="view">

    <div class="card tree-card">
      <div class="section-label" id="lbl-tree">Durian Tree</div>
      <svg id="treeSvg" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="tree-stats">
        <div class="tree-progress-row">
          <span class="tree-current" id="treeCurrent">0</span>
          <span class="tree-max">/100</span>
        </div>
        <div class="tree-num-label" id="treeNumLabel">Tree #1</div>
        <div class="tree-breakdown">
          <span>🚶 <span id="treeWalkin">0</span></span>
          <span style="color:var(--muted)">·</span>
          <span>🏨 <span id="treeHotel">0</span></span>
        </div>
        <div class="tree-stage" id="treeStage"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-label" id="lbl-type">Guest Type</div>
      <div class="type-row">
        <button class="type-btn walkin"  onclick="selectType('walkin')"  id="btn-walkin">
          🚶<div><div class="type-label" id="lbl-walkin-btn">Walk-in</div><div class="type-sub" id="lbl-walkin-sub">Visiting guest</div></div>
        </button>
        <button class="type-btn staying" onclick="selectType('staying')" id="btn-staying">
          🏨<div><div class="type-label" id="lbl-staying-btn">Hotel Guest</div><div class="type-sub" id="lbl-staying-sub">Staying here</div></div>
        </button>
      </div>
    </div>

    <div class="card room-section" id="roomSection">
      <div class="section-label" id="lbl-room">Room Number</div>
      <div class="room-grid" id="roomGrid"></div>
    </div>

    <div class="card">
      <div class="section-label" id="lbl-count">Number of Guests</div>
      <div class="count-row">
        <div class="count-ctrl">
          <button class="count-btn" onclick="changeCount(-1)">−</button>
          <div class="count-num" id="countNum">1</div>
          <button class="count-btn" onclick="changeCount(1)">+</button>
        </div>
        <div style="font-size:12px;color:var(--muted);text-align:right;line-height:1.6" id="lbl-count-hint">
          How many guests<br>did you serve?
        </div>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" disabled onclick="handleSubmit()">Record Service</button>

    <div class="admin-link-row">
      <button class="admin-link" onclick="showView('admin')" id="lbl-admin">Admin</button>
    </div>

  </div><!-- /viewMain -->


  <!-- ═══ ADMIN VIEW ═══ -->
  <div id="viewAdmin" class="view" style="display:none">

    <button class="back-btn" onclick="showView('main')" id="lbl-back">← Back</button>

    <div class="card">
      <div class="section-label" id="lbl-stats">Summary</div>
      <div class="stats-tabs">
        <button class="stats-tab" id="tab-today" onclick="switchTab('today')">Today</button>
        <button class="stats-tab" id="tab-week"  onclick="switchTab('week')">This week</button>
        <button class="stats-tab active" id="tab-month" onclick="switchTab('month')">This month</button>
      </div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-icon">🚶</div>
          <div class="stat-num" id="statsWalkinGroups">0</div>
          <div class="stat-sub" id="statsWalkinGuests"></div>
          <div class="stat-lbl" id="lbl-stat-walkin">Walk-in</div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">🏨</div>
          <div class="stat-num" id="statsHotelGroups">0</div>
          <div class="stat-sub" id="statsHotelGuests"></div>
          <div class="stat-lbl" id="lbl-stat-hotel">Hotel</div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">🌳</div>
          <div class="stat-num" id="statsTrees">0</div>
          <div class="stat-sub"></div>
          <div class="stat-lbl" id="lbl-stat-trees">Trees</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-label" id="lbl-log">Recent Records</div>
      <div class="log-list log-list--admin" id="logList"></div>
    </div>

    <button class="danger-btn" onclick="confirmNewTree()" id="lbl-new-tree">Start new tree</button>

  </div><!-- /viewAdmin -->

</main>

<div class="toast" id="toast"><div class="toast-inner" id="toastMsg"></div></div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── Supabase ──────────────────────────────────────────
const SUPABASE_URL = 'https://xbtxluhvyuobcdipsjhe.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gFHEUXtGlz2-8TNcteJKgQ_ogSRWBdz';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── i18n ──────────────────────────────────────────────
const T = {
  en: {
    tree:          'Durian Tree',

let lang = 'en';
function toggleLang() { lang = lang === 'en' ? 'km' : 'en'; applyLang(); }
function applyLang() {
  const t = T[lang];
  document.getElementById('lbl-tree').textContent        = t.tree;
  document.getElementById('lbl-type').textContent        = t.type;
  document.getElementById('lbl-walkin-btn').textContent  = t.walkinBtn;
  document.getElementById('lbl-walkin-sub').textContent  = t.walkinSub;
  document.getElementById('lbl-staying-btn').textContent = t.stayingBtn;

  document.getElementById('lbl-count').textContent       = t.count;
  document.getElementById('lbl-count-hint').innerHTML    = t.countHint;
  document.getElementById('submitBtn').textContent       = t.submit;
  document.getElementById('lbl-admin').textContent       = t.admin;
  document.getElementById('lbl-back').textContent        = t.back;
  document.getElementById('lbl-stats').textContent       = t.stats;
  document.getElementById('tab-today').textContent       = t.tabToday;
  document.getElementById('tab-week').textContent        = t.tabWeek;
  document.getElementById('tab-month').textContent       = t.tabMonth;
  document.getElementById('lbl-stat-walkin').textContent = t.statWalkin;
  document.getElementById('lbl-stat-hotel').textContent  = t.statHotel;
  document.getElementById('lbl-stat-trees').textContent  = t.statTrees;
  document.getElementById('lbl-log').textContent         = t.log;
  document.getElementById('lbl-new-tree').textContent    = t.newTree;
  document.getElementById('langBtn').textContent         = t.langBtn;
  renderAll();
}

// ── Config ────────────────────────────────────────────
const ROOMS      = Array.from({ length: 24 }, (_, i) => String(101 + i));
const MILESTONES = [10, 20, 30, 50];

const DURIAN_POS = [
  [210, 112, 0.85], [254, 118, 0.90], [172, 138, 0.75],
  [293, 144, 0.78], [146, 165, 0.70],
  [316, 173, 0.72], [127, 191, 0.67],
  [222, 104, 0.88], [175, 182, 0.65], [267, 175, 0.70],
  [304, 157, 0.70], [153, 152, 0.67],
];
const STAGE_COUNTS = [0, 3, 5, 7, 10, 12];

function getStage(total) {
  if (total >= 100) return 5;
  if (total >= 50)  return 4;
  if (total >= 30)  return 3;
  if (total >= 20)  return 2;
  if (total >= 10)  return 1;
  return 0;
}

// ── State ─────────────────────────────────────────────
let selectedType = null;
let selectedRoom = null;
let guestCount   = 1;
let activePeriod = 'month';

// ── Storage ───────────────────────────────────────────
const STORAGE_KEY = 'sambor4';

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    return { entries: d.entries || [], pending: d.pending || [] };
  } catch(e) {
    return { entries: [], pending: [] };
  }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// ── Tree state (derived from entries) ─────────────────
function computeTreeState(entries) {
  const sorted = [...entries].sort((a, b) => a.ts - b.ts);
  let num = 1, walkin = 0, hotel = 0;
  for (const e of sorted) {
    if (e.type === 'completion' || e.type === 'tree_reset') {
      num++; walkin = 0; hotel = 0;
    } else if (e.type === 'walkin') {
      walkin += e.count;
    } else if (e.type === 'staying') {
      hotel += e.count;
    }
  }
  return { num, walkin, hotel };
}

// ── Date helpers ──────────────────────────────────────
function localDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function shortDate(dateStr) {
  if (!dateStr) return '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [, m, d] = dateStr.split('-').map(Number);
  return `${months[m-1]} ${d}`;
}

// ── Sync ──────────────────────────────────────────────
function updateSyncStatus(status) {
  document.getElementById('syncDot').className = `sync-dot sync-dot--${status}`;
}

async function syncEntry(entry) {
  try {
    const { error } = await sb.from('entries').upsert(
      { type: entry.type, room: entry.room || null, count: entry.count,
        date: entry.date, time: entry.time, ts: entry.ts },
      { onConflict: 'ts' }
    );
    if (!error) {
      const data = loadData();
      data.pending = data.pending.filter(ts => ts !== entry.ts);
      saveData(data);
    }
  } catch(e) { /* stays in pending */ }
}

async function syncPending() {
  const data = loadData();
  if (!data.pending.length) return;
  const toSync = data.entries.filter(e => data.pending.includes(e.ts));
  for (const entry of toSync) await syncEntry(entry);
}

async function pullFromSupabase() {
  try {
    const { data: remote, error } = await sb.from('entries').select('*');
    if (error || !remote) return;
    const local = loadData();
    const pendingSet  = new Set(local.pending);
    const pendingEntries = local.entries.filter(e => pendingSet.has(e.ts));
    const remoteSet   = new Set(remote.map(e => e.ts));
    local.entries = [...remote, ...pendingEntries.filter(e => !remoteSet.has(e.ts))];
    saveData(local);
    renderAll();
  } catch(e) { /* offline */ }
}

let realtimeChannel = null;

function subscribeRealtime() {
  if (realtimeChannel) return;
  realtimeChannel = sb.channel('entries-sync')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'entries' },
      ({ new: entry }) => {
        const data = loadData();
        if (data.entries.some(e => e.ts === entry.ts)) return;
        data.entries.push(entry);
        saveData(data);
        renderAll();
      })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'entries' },
      ({ old: entry }) => {
        const data = loadData();
        data.entries = data.entries.filter(e => e.ts !== entry.ts);
        saveData(data);
        renderAll();
      })
    .subscribe();
}

function unsubscribeRealtime() {
  if (realtimeChannel) { realtimeChannel.unsubscribe(); realtimeChannel = null; }
}

async function initSync() {
  updateSyncStatus('syncing');
  await syncPending();
  await pullFromSupabase();
  subscribeRealtime();
  updateSyncStatus('online');
}

window.addEventListener('online', async () => {
  updateSyncStatus('syncing');
  await syncPending();
  await pullFromSupabase();
  subscribeRealtime();
  updateSyncStatus('online');
});
window.addEventListener('offline', () => {
  updateSyncStatus('offline');
  unsubscribeRealtime();
});

// ── View ──────────────────────────────────────────────
function showView(v) {
  document.getElementById('viewMain').style.display  = v === 'main'  ? 'flex' : 'none';
  document.getElementById('viewAdmin').style.display = v === 'admin' ? 'flex' : 'none';
  if (v === 'admin') renderAll();
}

// ── Durian SVG ────────────────────────────────────────
function makeDurian(cx, cy, s, stage) {
  const pal = [
    { b: '#3a6e15', sp: '#294e0f' }, { b: '#4a8520', sp: '#335a12' },
    { b: '#5a9a28', sp: '#3d6a18' }, { b: '#8aab2e', sp: '#5a7a1e' },
    { b: '#c8a800', sp: '#907800' }, { b: '#d4820a', sp: '#a05a08' },
  ];
  const p = pal[stage];
  const rx = 14 * s, ry = 19 * s;
  let spk = '';
  for (let i = 0; i < 12; i++) {
    const a  = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const ex = cx + rx * Math.cos(a), ey = cy + ry * Math.sin(a);
    const dx = ex - cx, dy = ey - cy, dd = Math.sqrt(dx*dx + dy*dy);
    const ux = dx/dd, uy = dy/dd;
    const ox = ex + ux*9*s, oy = ey + uy*9*s, pw = 3.5*s;
    spk += `<polygon points="${ex-uy*pw},${ey+ux*pw} ${ox},${oy} ${ex+uy*pw},${ey-ux*pw}" fill="${p.sp}"/>`;
  }
  return `<g>${spk}
    <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${p.b}"/>
    <ellipse cx="${cx-rx*.25}" cy="${cy-ry*.28}" rx="${rx*.28}" ry="${ry*.18}" fill="rgba(255,255,255,.18)"/>
    <line x1="${cx}" y1="${cy-ry}" x2="${cx+2*s}" y2="${cy-ry-8*s}" stroke="#5c3d11" stroke-width="${Math.max(1.5,2*s)}" stroke-linecap="round"/>
  </g>`;
}

function renderTree(overrideEntries) {
  const { entries } = loadData();
  const state = computeTreeState(overrideEntries ?? entries);
  const total = state.walkin + state.hotel;
  const stage = getStage(total);
  const t     = T[lang];

  let html = '';
  html += `<ellipse cx="220" cy="275" rx="76" ry="7" fill="#0a1a08" opacity="0.55"/>`;
  html += `<path d="M206,273 L212,198 L228,198 L234,273 Z" fill="#7a4e1a"/>`;
  html += `<path d="M209,273 L213,198 L215,198 L212,273 Z" fill="#9a6a30" opacity="0.45"/>`;
  html += `<ellipse cx="204" cy="271" rx="11" ry="5" fill="#7a4e1a"/>`;
  html += `<ellipse cx="236" cy="271" rx="11" ry="5" fill="#7a4e1a"/>`;
  html += `<circle cx="132" cy="190" r="62" fill="#1a4e08"/>`;
  html += `<circle cx="308" cy="190" r="62" fill="#1a4e08"/>`;
  html += `<circle cx="177" cy="194" r="60" fill="#1e5c0f"/>`;
  html += `<circle cx="263" cy="187" r="57" fill="#1e5c0f"/>`;
  html += `<circle cx="220" cy="168" r="86" fill="#1e5c0f"/>`;
  html += `<circle cx="164" cy="168" r="46" fill="#246e12"/>`;
  html += `<circle cx="276" cy="170" r="46" fill="#246e12"/>`;
  html += `<circle cx="220" cy="138" r="68" fill="#246e12"/>`;
  html += `<circle cx="220" cy="118" r="50" fill="#2a7e15"/>`;
  for (let i = 0; i < STAGE_COUNTS[stage]; i++) {
    const [dx, dy, ds] = DURIAN_POS[i];
    html += makeDurian(dx, dy, ds, stage);
  }
  document.getElementById('treeSvg').innerHTML = html;
  document.getElementById('treeCurrent').textContent  = total;
  document.getElementById('treeNumLabel').textContent = t.treeNumLabel(state.num);
  document.getElementById('treeWalkin').textContent   = state.walkin;
  document.getElementById('treeHotel').textContent    = state.hotel;
  document.getElementById('treeStage').textContent    = t.stageNames[stage];
}

// ── Stats ─────────────────────────────────────────────
function switchTab(period) {
  activePeriod = period;
  ['today','week','month'].forEach(p =>
    document.getElementById('tab-'+p).classList.toggle('active', p === period)
  );
  renderStats();
}

function getDateRange(period) {
  const now = new Date(), today = localDate(now);
  if (period === 'today') return { start: today, end: today };
  if (period === 'week') {
    const diff = now.getDay() === 0 ? 6 : now.getDay() - 1;
    const mon  = new Date(now); mon.setDate(now.getDate() - diff);
    const sun  = new Date(mon); sun.setDate(mon.getDate() + 6);
    return { start: localDate(mon), end: localDate(sun) };
  }
  const y = now.getFullYear(), m = now.getMonth();
  return { start: localDate(new Date(y,m,1)), end: localDate(new Date(y,m+1,0)) };
}

function renderStats() {
  const { entries } = loadData();
  const { start, end } = getDateRange(activePeriod);
  const pe    = entries.filter(e => e.date >= start && e.date <= end);
  const wi    = pe.filter(e => e.type === 'walkin');
  const ht    = pe.filter(e => e.type === 'staying');
  const trees = pe.filter(e => e.type === 'completion').length;
  const t = T[lang];
  document.getElementById('statsWalkinGroups').textContent = wi.length;
  document.getElementById('statsWalkinGuests').textContent = t.guests(wi.reduce((s,e) => s+e.count, 0));
  document.getElementById('statsHotelGroups').textContent  = ht.length;
  document.getElementById('statsHotelGuests').textContent  = t.guests(ht.reduce((s,e) => s+e.count, 0));
  document.getElementById('statsTrees').textContent        = trees;
}

// ── Log ───────────────────────────────────────────────
function renderLog() {
  const { entries } = loadData();
  const list = document.getElementById('logList');
  const t    = T[lang];
  const todayStr = localDate(new Date());
  const sorted = [...entries].sort((a,b) => b.ts - a.ts).slice(0, 30);

  if (sorted.length === 0) {
    list.innerHTML = `<div class="empty-state">${t.logEmpty}</div>`;
    return;
  }
  list.innerHTML = '';
  sorted.forEach(entry => {
    const item  = document.createElement('div');
    item.className = 'log-item';
    const dp    = entry.date && entry.date !== todayStr ? `${shortDate(entry.date)}  ` : '';
    const left  = document.createElement('span');

    if (entry.type === 'walkin' || entry.type === 'staying') {
      left.textContent = `${dp}${entry.time}  👤${entry.count}${entry.room ? '  Rm '+entry.room : ''}`;
    } else if (entry.type === 'completion') {
      left.textContent = `${dp}${entry.time}  🌳 Tree complete`;
    } else {
      left.textContent = `${dp}${entry.time}  🔄 New tree`;
    }

    const badge = document.createElement('span');
    if (entry.type === 'walkin') {
      badge.className = 'log-badge walkin'; badge.textContent = 'Walk-in';
    } else if (entry.type === 'staying') {
      badge.className = 'log-badge staying'; badge.textContent = 'Staying';
    } else {
      badge.className = 'log-badge event';
      badge.textContent = entry.type === 'completion' ? 'Complete' : 'Reset';
    }

    const del = document.createElement('button');
    del.className = 'log-del'; del.textContent = '×';
    del.onclick = () => deleteLogEntry(entry.ts);

    item.append(left, badge, del);
    list.appendChild(item);
  });
}

function renderAll() { renderTree(); renderStats(); renderLog(); }

// ── Guest type ────────────────────────────────────────
function selectType(type) {
  selectedType = type; selectedRoom = null;
  document.getElementById('btn-walkin').classList.toggle('selected',  type==='walkin');
  document.getElementById('btn-staying').classList.toggle('selected', type==='staying');
  const rs = document.getElementById('roomSection');
  rs.classList.toggle('visible', type==='staying');
  if (type === 'staying') renderRooms();
  checkSubmit();
}
function renderRooms() {
  const grid = document.getElementById('roomGrid');
  grid.innerHTML = '';
  ROOMS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (selectedRoom===r?' selected':'');
    btn.textContent = r; btn.onclick = () => selectRoom(r);
    grid.appendChild(btn);
  });
}
function selectRoom(r) { selectedRoom = r; renderRooms(); checkSubmit(); }
function changeCount(delta) {
  guestCount = Math.max(1, Math.min(20, guestCount+delta));
  document.getElementById('countNum').textContent = guestCount;
}
function checkSubmit() {
  document.getElementById('submitBtn').disabled =
    !(selectedType && (selectedType==='walkin' || selectedRoom));
}
function resetForm() {
  selectedType = null; selectedRoom = null; guestCount = 1;
  document.getElementById('countNum').textContent = '1';
  document.getElementById('btn-walkin').classList.remove('selected');
  document.getElementById('btn-staying').classList.remove('selected');
  document.getElementById('roomSection').classList.remove('visible');
}

// ── Submit ────────────────────────────────────────────
async function handleSubmit() {
  const data = loadData();
  const prevState = computeTreeState(data.entries);
  const prevTotal = prevState.walkin + prevState.hotel;
  const today = localDate(new Date());
  const time  = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  const ts    = Date.now();
  const t     = T[lang];

  const entry = { type: selectedType, room: selectedRoom, count: guestCount, date: today, time, ts };
  data.entries.push(entry);
  data.pending.push(ts);

  const newState = computeTreeState(data.entries);
  const newTotal = newState.walkin + newState.hotel;

  if (newTotal >= 100) {
    const completedNum = newState.num;
    const cTs    = ts + 1;
    const cEntry = { type: 'completion', count: 0, date: today, time, ts: cTs };
    data.entries.push(cEntry);
    data.pending.push(cTs);
    saveData(data);

    renderTree(data.entries.filter(e => e.ts !== cTs));
    renderLog();
    showToast(t.toastComplete(completedNum));
    setTimeout(() => launchConfetti(), 300);

    resetForm();
    document.getElementById('submitBtn').disabled = true;
    setTimeout(() => { renderAll(); checkSubmit(); }, 3000);

    syncEntry(entry);
    syncEntry(cEntry);

  } else {
    saveData(data);
    showToast(selectedType==='walkin'
      ? t.toastWalkin(guestCount)
      : t.toastStaying(guestCount, selectedRoom));

    if (MILESTONES.some(m => newTotal>=m && prevTotal<m)) {
      setTimeout(() => { showToast(t.toastMile(newTotal)); launchConfetti(); }, 700);
    }
    resetForm();
    renderAll();
    checkSubmit();
    syncEntry(entry);
  }
}

// ── Delete ────────────────────────────────────────────
async function deleteLogEntry(ts) {
  if (!navigator.onLine) { showToast(T[lang].offlineDelete); return; }
  if (!confirm(T[lang].deleteConfirm)) return;
  try {
    const { error } = await sb.from('entries').delete().eq('ts', ts);
    if (error) throw error;
    const data = loadData();
    data.entries = data.entries.filter(e => e.ts !== ts);
    data.pending = data.pending.filter(t => t !== ts);
    saveData(data);
    renderAll();
  } catch(e) {
    showToast(T[lang].deleteFailed);
  }
}

// ── New tree ──────────────────────────────────────────
async function confirmNewTree() {
  if (!confirm(T[lang].newTreeConfirm)) return;
  const today = localDate(new Date());
  const time  = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  const entry = { type: 'tree_reset', count: 0, date: today, time, ts: Date.now() };
  const data  = loadData();
  data.entries.push(entry);
  data.pending.push(entry.ts);
  saveData(data);
  resetForm(); checkSubmit(); renderAll();
  syncEntry(entry);
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').innerHTML = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Confetti ──────────────────────────────────────────
function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#c9a84c','#e8c97a','#a8e6c4','#5a9a28','#d4820a','#ffffff'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (.8+Math.random()*1.4)+'s';
    p.style.animationDelay = (Math.random()*.8)+'s';
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

// ── Init ──────────────────────────────────────────────
renderAll();
applyLang();
if (navigator.onLine) {
  initSync();
} else {
  updateSyncStatus('offline');
}
