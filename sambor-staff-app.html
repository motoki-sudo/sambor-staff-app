<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sambor Staff · Restaurant Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --jungle:   #1a3a2a;
    --deep:     #0f2218;
    --gold:     #c9a84c;
    --gold-lt:  #e8c97a;
    --cream:    #f5f0e8;
    --cream-dk: #e8e0d0;
    --text:     #1a1a1a;
    --muted:    #6b7a6e;
    --walkin:   #2d6a4f;
    --staying:  #1e4d6b;
    --radius:   14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--jungle);
    min-height: 100dvh;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .hotel-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: .12em;
    line-height: 1.5;
  }
  .hotel-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .lang-toggle {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background .2s;
  }
  .lang-toggle:active { background: rgba(201,168,76,.15); }

  /* ── Main card ── */
  main {
    width: 100%;
    max-width: 480px;
    padding: 16px 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(201,168,76,.18);
    border-radius: var(--radius);
    padding: 20px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  /* ── Staff selector ── */
  .staff-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .staff-btn {
    background: rgba(255,255,255,.05);
    border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 10px 8px;
    color: var(--cream);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .staff-btn .staff-count {
    font-size: 10px;
    color: var(--gold-lt);
    font-weight: 600;
  }
  .staff-btn.selected {
    background: rgba(201,168,76,.18);
    border-color: var(--gold);
    color: var(--gold-lt);
  }
  .staff-btn:active { transform: scale(.97); }

  /* ── Guest type ── */
  .type-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .type-btn {
    border: none;
    border-radius: 12px;
    padding: 18px 12px;
    font-size: 22px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .type-btn .type-label {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    text-align: center;
  }
  .type-btn .type-sub {
    font-size: 10px;
    opacity: .7;
    text-align: center;
    line-height: 1.4;
  }
  .type-btn.walkin {
    background: var(--walkin);
    color: #a8e6c4;
  }
  .type-btn.staying {
    background: var(--staying);
    color: #a8d0e8;
  }
  .type-btn.selected {
    outline: 2.5px solid var(--gold);
    outline-offset: 2px;
  }
  .type-btn:active { transform: scale(.96); }

  /* ── Room selector ── */
  .room-section {
    display: none;
  }
  .room-section.visible { display: block; }

  .room-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
    margin-top: 4px;
  }

  .room-btn {
    background: rgba(255,255,255,.06);
    border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 8px;
    padding: 10px 4px;
    color: var(--cream);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .room-btn.selected {
    background: rgba(30,77,107,.6);
    border-color: #6ab0d4;
    color: #a8d0e8;
  }
  .room-btn:active { transform: scale(.95); }

  /* ── Guest count ── */
  .count-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .count-ctrl {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .count-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,.4);
    background: transparent;
    color: var(--gold-lt);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    transition: background .15s;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .count-btn:active { background: rgba(201,168,76,.15); }

  .count-num {
    font-size: 32px;
    font-weight: 600;
    color: var(--gold-lt);
    min-width: 40px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* ── Submit ── */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--gold) 0%, #a87c2a 100%);
    border: none;
    border-radius: var(--radius);
    color: var(--deep);
    font-size: 16px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    letter-spacing: .03em;
  }
  .submit-btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }
  .submit-btn:not(:disabled):active { transform: scale(.98); }

  /* ── Toast / celebration ── */
  .toast {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  .toast-inner {
    margin-top: 24px;
    background: var(--deep);
    border: 1.5px solid var(--gold);
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold-lt);
    transform: translateY(-80px);
    opacity: 0;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .25s;
    text-align: center;
    max-width: 320px;
    width: calc(100% - 40px);
  }
  .toast.show .toast-inner {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── Leaderboard ── */
  .lb-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .lb-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,.04);
    border-radius: 10px;
  }

  .lb-rank {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    width: 20px;
    text-align: center;
  }
  .lb-rank.top { color: var(--gold); font-size: 16px; }

  .lb-name { flex: 1; font-size: 14px; font-weight: 500; }

  .lb-bar-wrap {
    flex: 2;
    height: 6px;
    background: rgba(255,255,255,.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .lb-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-lt) 100%);
    border-radius: 3px;
    transition: width .5s ease;
  }

  .lb-count {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-lt);
    min-width: 28px;
    text-align: right;
  }

  /* ── Recent log ── */
  .log-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
  }
  .log-item {
    font-size: 12px;
    color: rgba(245,240,232,.6);
    padding: 6px 10px;
    background: rgba(255,255,255,.03);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .log-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .log-badge.walkin { background: rgba(45,106,79,.5); color: #a8e6c4; }
  .log-badge.staying { background: rgba(30,77,107,.5); color: #a8d0e8; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px 0;
  }

  /* ── Reset ── */
  .reset-row {
    display: flex;
    justify-content: center;
    padding-top: 4px;
  }
  .reset-btn {
    background: transparent;
    border: none;
    color: rgba(245,240,232,.25);
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    padding: 6px 12px;
    text-decoration: underline;
  }

  /* ── Confetti ── */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 200;
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    top: -10px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── Scrollbar ── */
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,.3); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="hotel-name">Sambor Village Hotel</div>
    <div class="hotel-sub">Restaurant · Staff App</div>
  </div>
  <button class="lang-toggle" onclick="toggleLang()" id="langBtn">ភាសាខ្មែរ</button>
</header>

<main>

  <!-- Staff -->
  <div class="card">
    <div class="section-label" id="lbl-staff">Select Your Name</div>
    <div class="staff-grid" id="staffGrid"></div>
  </div>

  <!-- Guest type -->
  <div class="card">
    <div class="section-label" id="lbl-type">Guest Type</div>
    <div class="type-row">
      <button class="type-btn walkin" onclick="selectType('walkin')" id="btn-walkin">
        🚶
        <div>
          <div class="type-label" id="lbl-walkin-btn">Walk-in</div>
          <div class="type-sub" id="lbl-walkin-sub">Visiting guest</div>
        </div>
      </button>
      <button class="type-btn staying" onclick="selectType('staying')" id="btn-staying">
        🏨
        <div>
          <div class="type-label" id="lbl-staying-btn">Hotel Guest</div>
          <div class="type-sub" id="lbl-staying-sub">Staying here</div>
        </div>
      </button>
    </div>
  </div>

  <!-- Room selector -->
  <div class="card room-section" id="roomSection">
    <div class="section-label" id="lbl-room">Room Number</div>
    <div class="room-grid" id="roomGrid"></div>
  </div>

  <!-- Guest count -->
  <div class="card">
    <div class="section-label" id="lbl-count">Number of Guests</div>
    <div class="count-row">
      <div class="count-ctrl">
        <button class="count-btn" onclick="changeCount(-1)">−</button>
        <div class="count-num" id="countNum">1</div>
        <button class="count-btn" onclick="changeCount(1)">+</button>
      </div>
      <div style="font-size:12px; color:var(--muted); text-align:right; line-height:1.6;" id="lbl-count-hint">
        How many guests<br>did you serve?
      </div>
    </div>
  </div>

  <!-- Submit -->
  <button class="submit-btn" id="submitBtn" disabled onclick="handleSubmit()" id="lbl-submit">
    Record Service
  </button>

  <!-- Leaderboard -->
  <div class="card">
    <div class="section-label" id="lbl-lb">Today's Leaderboard</div>
    <div class="lb-list" id="lbList">
      <div class="empty-state" id="lbl-empty">No records yet. Be the first! 🌟</div>
    </div>
  </div>

  <!-- Recent log -->
  <div class="card">
    <div class="section-label" id="lbl-log">Recent Records</div>
    <div class="log-list" id="logList">
      <div class="empty-state" id="lbl-log-empty">Records will appear here</div>
    </div>
  </div>

  <div class="reset-row">
    <button class="reset-btn" onclick="confirmReset()" id="lbl-reset">Reset today's data</button>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-inner" id="toastMsg"></div>
</div>

<!-- Confetti -->
<div class="confetti-wrap" id="confettiWrap"></div>

<script>
// ── i18n ──────────────────────────────────────────────
const T = {
  en: {
    staff:         'Select Your Name',
    type:          'Guest Type',
    walkinBtn:     'Walk-in',
    walkinSub:     'Visiting guest',
    stayingBtn:    'Hotel Guest',
    stayingSub:    'Staying here',
    room:          'Room Number',
    count:         'Number of Guests',
    countHint:     'How many guests<br>did you serve?',
    submit:        'Record Service',
    lb:            "Today's Leaderboard",
    empty:         'No records yet. Be the first! 🌟',
    log:           'Recent Records',
    logEmpty:      'Records will appear here',
    reset:         "Reset today's data",
    toastWalkin:   (name, n) => `✅ ${name} — ${n} walk-in guest${n>1?'s':''}!`,
    toastStaying:  (name, n, room) => `✅ ${name} — Room ${room}, ${n} guest${n>1?'s':''}!`,
    toastMile:     (name, total) => `🌟 ${name} hit ${total} guests today!`,
    resetConfirm:  "Reset all today's data?",
    langBtn:       'ភាសាខ្មែរ',
  },
  km: {
    staff:         'ជ្រើសឈ្មោះអ្នក',
    type:          'ប្រភេទភ្ញៀវ',
    walkinBtn:     'Walk-in',
    walkinSub:     'ភ្ញៀវក្រៅ',
    stayingBtn:    'ភ្ញៀវស្នាក់',
    stayingSub:    'ស្នាក់នៅទីនេះ',
    room:          'លេខបន្ទប់',
    count:         'ចំនួនភ្ញៀវ',
    countHint:     'ភ្ញៀវប៉ុន្មាននាក់<br>ដែលអ្នកបម្រើ?',
    submit:        'កត់ត្រាការបម្រើ',
    lb:            'តារាងចំណាត់ថ្នាក់ថ្ងៃនេះ',
    empty:         'មិនទាន់មានទិន្នន័យ ។ ចាប់ផ្ដើម! 🌟',
    log:           'កំណត់ត្រាថ្មីៗ',
    logEmpty:      'ការកត់ត្រានឹងបង្ហាញនៅទីនេះ',
    reset:         'កំណត់ឡើងវិញ',
    toastWalkin:   (name, n) => `✅ ${name} — ភ្ញៀវ ${n} នាក់!`,
    toastStaying:  (name, n, room) => `✅ ${name} — បន្ទប់ ${room}, ${n} នាក់!`,
    toastMile:     (name, total) => `🌟 ${name} បានបម្រើ ${total} នាក់ថ្ងៃនេះ!`,
    resetConfirm:  'កំណត់ទិន្នន័យឡើងវិញ?',
    langBtn:       'English',
  }
};

let lang = 'en';
function toggleLang() {
  lang = lang === 'en' ? 'km' : 'en';
  applyLang();
}
function applyLang() {
  const t = T[lang];
  document.getElementById('lbl-staff').textContent     = t.staff;
  document.getElementById('lbl-type').textContent      = t.type;
  document.getElementById('lbl-walkin-btn').textContent = t.walkinBtn;
  document.getElementById('lbl-walkin-sub').textContent = t.walkinSub;
  document.getElementById('lbl-staying-btn').textContent= t.stayingBtn;
  document.getElementById('lbl-staying-sub').textContent= t.stayingSub;
  document.getElementById('lbl-room').textContent      = t.room;
  document.getElementById('lbl-count').textContent     = t.count;
  document.getElementById('lbl-count-hint').innerHTML  = t.countHint;
  document.getElementById('submitBtn').textContent     = t.submit;
  document.getElementById('lbl-lb').textContent        = t.lb;
  document.getElementById('lbl-log').textContent       = t.log;
  document.getElementById('lbl-reset').textContent     = t.reset;
  document.getElementById('langBtn').textContent       = t.langBtn;
  renderLeaderboard();
  renderLog();
}

// ── State ─────────────────────────────────────────────
const STAFF_NAMES = ['Dara','Sokha','Maly','Piseth','Channary','Ratanak','Sreyla','Veasna'];
const ROOMS = Array.from({length:24}, (_,i) => String(101 + i));

let selectedStaff = null;
let selectedType  = null;
let selectedRoom  = null;
let guestCount    = 1;

// ── Load / Save data ───────────────────────────────────
function todayKey() {
  return 'sambor_' + new Date().toISOString().slice(0,10);
}
function loadData() {
  try { return JSON.parse(localStorage.getItem(todayKey()) || '{"counts":{},"log":[]}'); }
  catch(e) { return {counts:{}, log:[]}; }
}
function saveData(data) {
  localStorage.setItem(todayKey(), JSON.stringify(data));
}

// ── Render staff grid ──────────────────────────────────
function renderStaff() {
  const data  = loadData();
  const grid  = document.getElementById('staffGrid');
  grid.innerHTML = '';
  STAFF_NAMES.forEach(name => {
    const count = (data.counts[name] || 0);
    const btn = document.createElement('button');
    btn.className = 'staff-btn' + (selectedStaff === name ? ' selected' : '');
    btn.innerHTML = `<span>${name}</span><span class="staff-count">${count > 0 ? '👤 '+count : ''}</span>`;
    btn.onclick = () => selectStaff(name);
    grid.appendChild(btn);
  });
}

function selectStaff(name) {
  selectedStaff = name;
  renderStaff();
  checkSubmit();
}

// ── Guest type ─────────────────────────────────────────
function selectType(type) {
  selectedType = type;
  selectedRoom = null;
  document.getElementById('btn-walkin').classList.toggle('selected', type==='walkin');
  document.getElementById('btn-staying').classList.toggle('selected', type==='staying');
  const rs = document.getElementById('roomSection');
  rs.classList.toggle('visible', type==='staying');
  if (type === 'staying') renderRooms();
  checkSubmit();
}

// ── Room grid ──────────────────────────────────────────
function renderRooms() {
  const grid = document.getElementById('roomGrid');
  grid.innerHTML = '';
  ROOMS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (selectedRoom === r ? ' selected' : '');
    btn.textContent = r;
    btn.onclick = () => selectRoom(r);
    grid.appendChild(btn);
  });
}
function selectRoom(r) {
  selectedRoom = r;
  renderRooms();
  checkSubmit();
}

// ── Count ──────────────────────────────────────────────
function changeCount(delta) {
  guestCount = Math.max(1, Math.min(20, guestCount + delta));
  document.getElementById('countNum').textContent = guestCount;
}

// ── Submit check ───────────────────────────────────────
function checkSubmit() {
  const ok = selectedStaff && selectedType && (selectedType === 'walkin' || selectedRoom);
  document.getElementById('submitBtn').disabled = !ok;
}

// ── Submit ─────────────────────────────────────────────
function handleSubmit() {
  const data = loadData();
  if (!data.counts[selectedStaff]) data.counts[selectedStaff] = 0;
  data.counts[selectedStaff] += guestCount;

  const entry = {
    staff: selectedStaff,
    type:  selectedType,
    room:  selectedRoom,
    count: guestCount,
    time:  new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}),
  };
  data.log.unshift(entry);
  saveData(data);

  const t = T[lang];
  const total = data.counts[selectedStaff];
  let msg = selectedType === 'walkin'
    ? t.toastWalkin(selectedStaff, guestCount)
    : t.toastStaying(selectedStaff, guestCount, selectedRoom);

  // milestone check
  const milestones = [10,20,30,50,100];
  if (milestones.some(m => total >= m && total - guestCount < m)) {
    setTimeout(() => { showToast(t.toastMile(selectedStaff, total)); launchConfetti(); }, 600);
  }

  showToast(msg);

  // reset form (keep staff)
  selectedType = null;
  selectedRoom = null;
  guestCount   = 1;
  document.getElementById('countNum').textContent = '1';
  document.getElementById('btn-walkin').classList.remove('selected');
  document.getElementById('btn-staying').classList.remove('selected');
  document.getElementById('roomSection').classList.remove('visible');
  checkSubmit();
  renderStaff();
  renderLeaderboard();
  renderLog();
}

// ── Leaderboard ────────────────────────────────────────
function renderLeaderboard() {
  const data    = loadData();
  const sorted  = Object.entries(data.counts).sort((a,b) => b[1]-a[1]);
  const list    = document.getElementById('lbList');
  const empty   = document.getElementById('lbl-empty');
  const t       = T[lang];

  if (sorted.length === 0) {
    list.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'empty-state';
    div.textContent = t.empty;
    list.appendChild(div);
    return;
  }
  const max = sorted[0][1];
  list.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  sorted.forEach(([name, count], i) => {
    const item = document.createElement('div');
    item.className = 'lb-item';
    const rankEl = document.createElement('div');
    rankEl.className = 'lb-rank' + (i < 3 ? ' top' : '');
    rankEl.textContent = medals[i] || (i+1);
    const nameEl = document.createElement('div');
    nameEl.className = 'lb-name';
    nameEl.textContent = name;
    const barWrap = document.createElement('div');
    barWrap.className = 'lb-bar-wrap';
    const bar = document.createElement('div');
    bar.className = 'lb-bar';
    bar.style.width = (count / max * 100) + '%';
    barWrap.appendChild(bar);
    const countEl = document.createElement('div');
    countEl.className = 'lb-count';
    countEl.textContent = count;
    item.append(rankEl, nameEl, barWrap, countEl);
    list.appendChild(item);
  });
}

// ── Log ────────────────────────────────────────────────
function renderLog() {
  const data = loadData();
  const list = document.getElementById('logList');
  const t    = T[lang];
  if (data.log.length === 0) {
    list.innerHTML = `<div class="empty-state">${t.logEmpty}</div>`;
    return;
  }
  list.innerHTML = '';
  data.log.slice(0, 20).forEach(entry => {
    const item = document.createElement('div');
    item.className = 'log-item';
    const left = document.createElement('span');
    left.textContent = `${entry.time}  ${entry.staff}  👤${entry.count}${entry.room ? '  Rm '+entry.room : ''}`;
    const badge = document.createElement('span');
    badge.className = 'log-badge ' + entry.type;
    badge.textContent = entry.type === 'walkin' ? 'Walk-in' : 'Staying';
    item.append(left, badge);
    list.appendChild(item);
  });
}

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').innerHTML = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── Confetti ───────────────────────────────────────────
function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#c9a84c','#e8c97a','#a8e6c4','#a8d0e8','#ffffff'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (.8 + Math.random() * 1.2) + 's';
    p.style.animationDelay = (Math.random() * .5) + 's';
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// ── Reset ──────────────────────────────────────────────
function confirmReset() {
  if (confirm(T[lang].resetConfirm)) {
    localStorage.removeItem(todayKey());
    selectedStaff = null; selectedType = null; selectedRoom = null; guestCount = 1;
    document.getElementById('countNum').textContent = '1';
    document.getElementById('btn-walkin').classList.remove('selected');
    document.getElementById('btn-staying').classList.remove('selected');
    document.getElementById('roomSection').classList.remove('visible');
    checkSubmit();
    renderStaff();
    renderLeaderboard();
    renderLog();
  }
}

// ── Init ───────────────────────────────────────────────
renderStaff();
renderLeaderboard();
renderLog();
applyLang();
</script>
